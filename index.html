<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>深渊呼吸</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #ccc;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            padding: 40px 20px;
        }
        h1 {
            font-size: 1.8rem;
            color: #999;
            letter-spacing: 0.3em;
            margin-bottom: 40px;
            border: 2px solid #333;
            padding: 20px 30px;
            display: inline-block;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }
        a {
            display: block;
            width: 280px;
            padding: 18px 30px;
            background: rgba(15, 20, 25, 0.95);
            border: 2px solid #00ffff;
            color: #00ffff;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            transition: all 0.2s ease;
        }
        a:hover {
            background: rgba(0, 255, 255, 0.1);
            color: #fff;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>深渊呼吸</h1>

            <a href="实验组对标相关文件/control.html">进入对照组</a>
